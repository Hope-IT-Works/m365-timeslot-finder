name: Lint & Test

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_call:

jobs:
  lint:
    name: wxt build & vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build extension
        run: bun run build

      - name: Run tests
        run: bun run test
