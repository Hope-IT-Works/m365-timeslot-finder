name: Lint

on:
  push:
  pull_request:
  workflow_call:

jobs:
  lint:
    name: web-ext lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint
